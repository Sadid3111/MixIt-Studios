<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MixIt Studios</title>

<link rel="icon" type="image/png" sizes="32x32" href="https://raw.githubusercontent.com/Sadid3111/MixIt-Studios/main/images/logo3.png">

<!-- Font Awesome -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

/* ==========================
   GLOBAL / NEUMORPHIC
========================== */

body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: #e0e5ec;
    color: #333;
    overflow-x: hidden;
}

.container {
    width: 100%;
    max-width: 1400px;   /* prevents overly wide layout on big screens */
    margin: auto;        /* centers content */
    padding: 20px;       /* gives ~20px space on left/right */
}

* {
    box-sizing: border-box;
}
/* ==========================
   FULL WIDTH BANNER
========================== */

.banner {
    width: 100%;
    aspect-ratio: 16 / 5;
    position: relative;
    overflow: visible; /* 🔥 CHANGE THIS */
}

.banner img {
    width: 100%;
    height: 100%;
    object-fit: cover;
}

/* LOGO */

.logo {
    position: absolute;
    bottom: 120px;
    left: 50px;
    width: 250px;
    height: 250px;
    border-radius: 50%;
    background: #e0e5ec;
    padding: 8px;
    box-shadow: 8px 8px 15px #533f4a,
                -8px -8px 15px #535353;
}

.logo img {
    width: 100%;
    height: 100%;
    border-radius: 50%;
}

/* ==========================
   MOBILE / TABLET LOGO FIX
========================== */

@media (max-width: 768px) {

    .logo {
        left: 50%;
        bottom: -50px; /* adjust if needed */
        transform: translateX(-50%);
        width: 100px;
        height: 100px;
        z-index: 10; /* ensures it stays above */
    }

    .header-space {
        height: 90px; /* give enough room */
    }

}
/* ==========================
   SOCIAL INSIDE BANNER
========================== */

.banner-social {
    position: absolute;
    top: 7%;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 15px;
}

.social-icon {
    width: 50px;
    height: 50px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 20px;
    color: #555;
    text-decoration: none;
    background: #e0e5ec;
    box-shadow: 4px 4px 15px #a3b1c6,
                -4px -4px 15px #ffffff;
}

.social-icon:active {
    box-shadow: inset 5px 5px 10px #a3b1c6,
                inset -5px -5px 10px #ffffff;
}

.header-space {
    height: 40px;
}

/* ==========================
   BUTTONS
========================== */

.btn {
    padding: 13px 28px;
    border-radius: 30px;
    border: none;
    background: #e0e5ec;
    box-shadow: 8px 8px 15px #a3b1c6,
                -8px -8px 15px #ffffff;
    cursor: pointer;
    font-size: 15px;
    margin-top: 5px;
}

.center {
    text-align: center;
    margin-bottom: 35px;
}

/* Cancel Button */

.cancel-btn {
    position: fixed;
    top: 20px;
    right: 20px;
    width: 45px;
    height: 45px;
    border-radius: 50%;
    display: none;
    align-items: center;
    justify-content: center;
    background: #e0e5ec;
    box-shadow: 8px 8px 15px #a3b1c6,
                -8px -8px 15px #ffffff;
    cursor: pointer;
    z-index: 999;
}

.cancel-btn i {
    font-size: 18px;
}

/* ==========================
   PRODUCT GRID
========================== */

.products {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 20px;
    width: 100%;
}

/* Tablet */
@media (max-width: 1024px) {
    .products {
        grid-template-columns: repeat(3, 1fr);
    }
}

@media (max-width: 600px) {
    .products {
        grid-template-columns: repeat(2, 1fr);
        gap: 15px; /* slightly tighter for mobile */
    }
}

.card {
    
    background: #e0e5ec;
    border-radius: 22px;
    padding: 18px 18px 22px;
    text-align: center;
    position: relative;
    box-shadow: 8px 8px 15px #a3b1c6,
                -8px -8px 15px #ffffff;
    cursor: pointer;
    transition: 0.25s ease;
}

.card img {
    width: 100%;
    border-radius: 14px;
    margin-bottom: 10px;
}

.card h3 {
    margin: 12px 0 6px;
    font-size: 17px;
    font-weight: 600;
}

.price {
    font-weight: 600;
    margin-top: 4px;
    font-size: 15px;
    opacity: 0.8;
}

/* ==========================
   SELECT CIRCLE
========================== */

.select-circle {
    position: absolute;
    top: 15px;
    right: 15px;
    width: 22px;
    height: 22px;
    border-radius: 50%;
    border: 2px solid #999;
    display: none;
}

.select-circle.active {
    background: #25D366;
    border-color: #25D366;
}

.hidden {
    display: none;
}

</style>

</head>

<body>

<!-- CANCEL BUTTON -->
<div class="cancel-btn" onclick="cancelSelection()" id="cancelBtn">
<i class="fas fa-times"></i>
</div>

<!-- FULL WIDTH BANNER -->
<div class="banner">

<img src="https://raw.githubusercontent.com/Sadid3111/MixIt-Studios/main/images/mixit.png">

<div class="logo">
<img src="https://raw.githubusercontent.com/Sadid3111/MixIt-Studios/main/images/logo2.png">
</div>

<!-- SOCIAL INSIDE BANNER -->
<div class="banner-social">

<a href="https://www.facebook.com/mixitstudios11" target="_blank" class="social-icon">
<i class="fab fa-facebook-f"></i>
</a>

<a href="https://www.instagram.com/mixitstudios11/" target="_blank" class="social-icon">
<i class="fab fa-instagram"></i>
</a>

<a href="https://www.youtube.com/@MixItStudios11" target="_blank" class="social-icon">
<i class="fab fa-youtube"></i>
</a>

<a href="https://wa.me/8801725525541" target="_blank" class="social-icon">
<i class="fab fa-whatsapp"></i>
</a>

</div>

</div>

<div class="container">

<div class="header-space"></div>

<!-- ORDER BUTTON -->
<div class="center">
<button class="btn" onclick="enableSelection()">Order Now</button>
</div>

<!-- PRODUCTS -->
<div class="products">

<div class="card" data-name="Ocean Resin Lamp" data-price="2500">
<div class="select-circle"></div>
<img src="https://raw.githubusercontent.com/Sadid3111/MixIt-Studios/main/images/1.jpg">
<h3>Amber Breath</h3>
<div class="price">৳ 2500</div>
</div>

<div class="card" data-name="Galaxy Resin Lamp" data-price="2800">
<div class="select-circle"></div>
<img src="https://raw.githubusercontent.com/Sadid3111/MixIt-Studios/main/images/2.jpg">
<h3>Fire & Fury</h3>
<div class="price">৳ 2800</div>
</div>

<div class="card" data-name="Wood Resin Lamp" data-price="2300">
<div class="select-circle"></div>
<img src="https://raw.githubusercontent.com/Sadid3111/MixIt-Studios/main/images/3.jpg">
<h3>Sapphire Bliss</h3>
<div class="price">৳ 2300</div>
</div>

<div class="card" data-name="Crystal Resin Lamp" data-price="3200">
<div class="select-circle"></div>
<img src="https://raw.githubusercontent.com/Sadid3111/MixIt-Studios/main/images/4.jpg">
<h3>Emerald Slash</h3>
<div class="price">৳ 3200</div>
</div>

<div class="card" data-name="Crystal Resin Lamp" data-price="3200">
<div class="select-circle"></div>
<img src="https://raw.githubusercontent.com/Sadid3111/MixIt-Studios/main/images/5.jpg">
<h3>Pure Heart</h3>
<div class="price">৳ 3200</div>
</div>

<div class="card" data-name="Crystal Resin Lamp" data-price="3200">
<div class="select-circle"></div>
<img src="https://raw.githubusercontent.com/Sadid3111/MixIt-Studios/main/images/6.jpg">
<h3>Golden Tail</h3>
<div class="price">৳ 3200</div>
</div>

</div>

<!-- WHATSAPP -->
<div class="center hidden" id="whatsappOrder">
<button class="btn" onclick="orderWhatsApp()">Order via WhatsApp</button>
</div>

</div>

<script>

let selectionEnabled = false;

function enableSelection(){
selectionEnabled = true;

document.querySelectorAll('.select-circle').forEach(c=>{
c.style.display='block'
})

document.getElementById('whatsappOrder').classList.remove('hidden')
document.getElementById('cancelBtn').style.display='flex'
}

function cancelSelection(){
selectionEnabled=false;

document.querySelectorAll('.select-circle').forEach(c=>{
c.style.display='none'
c.classList.remove('active')
})

document.getElementById('whatsappOrder').classList.add('hidden')
document.getElementById('cancelBtn').style.display='none'
}

document.querySelectorAll('.card').forEach(card=>{
card.addEventListener('click',()=>{
if(!selectionEnabled) return;
card.querySelector('.select-circle').classList.toggle('active')
})
})

function orderWhatsApp(){

let selected=[]

document.querySelectorAll('.card').forEach(card=>{
let circle=card.querySelector('.select-circle')

if(circle.classList.contains('active')){
selected.push(
card.dataset.name + " - ৳" + card.dataset.price
)
}
})

if(selected.length==0){
alert('Select at least one item')
return
}

let message="Hello, I want to order:%0A%0A"

selected.forEach(item=>{
message += "• " + item + "%0A"
})

message += "%0APlease confirm availability."

let phone="8801725525541"
let url=`https://wa.me/${phone}?text=${message}`

window.open(url,'_blank')
}

</script>

</body>
</html>
